services:
  netgazer:
    build: .
    container_name: netgazer
    restart: unless-stopped
    ports:
      - "9527:9527"     # HTTP（Dashboard / API / WebSocket）
      - "50051:50051"   # gRPC（Agent 直连 Go server，不经 nginx）
    volumes:
      - netgazer_data:/var/lib/netgazer
    environment:
      - TZ=Asia/Shanghai

volumes:
  netgazer_data:
