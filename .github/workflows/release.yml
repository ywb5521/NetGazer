name: Release Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-agent:
    name: Build agent (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-amd64
            runner: ubuntu-latest
            goarch: amd64
            goos: linux
            cc: x86_64-linux-gnu-gcc
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
            goos: linux
            cc: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev gcc-${{ matrix.cc }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build agent
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.value }}" \
            -o /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }} \
            ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}
          path: /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}

  build-server:
    name: Build server (linux-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
            cc: x86_64-linux-gnu-gcc
          - goarch: arm64
            runner: ubuntu-24.04-arm
            cc: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev gcc-${{ matrix.cc }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build server
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w" \
            -o /tmp/netgazer-server-${{ steps.version.outputs.value }}-linux-${{ matrix.goarch }} \
            ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: netgazer-server-${{ steps.version.outputs.value }}-linux-${{ matrix.goarch }}
          path: /tmp/netgazer-server-${{ steps.version.outputs.value }}-linux-${{ matrix.goarch }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-agent, build-server]
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            binary=$(ls)
            chmod +x "$binary"
            tar czf "../${name}.tar.gz" "$binary"
            cd ..
          done
          ls -lh *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body: |
            ## NetGazer v${{ steps.version.outputs.value }}

            ### Agent
            Download the agent binary for your platform:
            - `netgazer-agent-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz` — Linux x86_64
            - `netgazer-agent-v${{ steps.version.outputs.value }}-linux-arm64.tar.gz` — Linux ARM64

            ### Server
            - `netgazer-server-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz` — Linux x86_64
            - `netgazer-server-v${{ steps.version.outputs.value }}-linux-arm64.tar.gz` — Linux ARM64

            ### Quick Install
            ```bash
            # Agent
            wget https://github.com/gtopng/netgazer/releases/download/v${{ steps.version.outputs.value }}/netgazer-agent-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz
            tar xzf netgazer-agent-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz
            sudo ./netgazer-agent --server-addr <server>:50051 --interfaces eth0 --node-id $(hostname)

            # Server
            wget https://github.com/gtopng/netgazer/releases/download/v${{ steps.version.outputs.value }}/netgazer-server-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz
            tar xzf netgazer-server-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz
            ./netgazer-server --http-port 8080 --grpc-port 50051
            ```

            ### Docker
            ```bash
            docker pull ghcr.io/gtopng/netgazer:v${{ steps.version.outputs.value }}
            ```
          files: artifacts/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
