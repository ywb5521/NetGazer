name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-amd64
            runner: ubuntu-latest
            goarch: amd64
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libndpi-dev

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build agent
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w -extldflags '-Wl,-rpath,\$ORIGIN' -X main.version=${{ steps.version.outputs.value }}" \
            -o /tmp/out/netgazer-agent \
            ./cmd/agent

      - name: Build server
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w -extldflags '-Wl,-rpath,\$ORIGIN'" \
            -o /tmp/out/netgazer-server \
            ./cmd/server

      - name: Bundle shared libraries
        run: |
          # Standard system libs present on every Linux — skip them
          STD_LIBS='libc\.|libm\.|libpthread\.|librt\.|libdl\.|libresolv\.|ld-linux|linux-vdso'
          # Common libs available on virtually every modern distro
          COMMON_LIBS='libsystemd\.|libcap\.|libgcrypt\.|libgpg-error\.|liblzma\.|libzstd\.|liblz4\.|libdbus-1\.'

          for binary in netgazer-agent netgazer-server; do
            echo "=== $binary ==="
            ldd /tmp/out/$binary 2>/dev/null | while read -r line; do
              so=$(echo "$line" | awk '{print $1}')
              path=$(echo "$line" | awk '{print $3}')
              # Skip standard and common libs
              if echo "$so" | grep -qE "${STD_LIBS}|${COMMON_LIBS}"; then
                continue
              fi
              if [ -n "$path" ] && [ -f "$path" ]; then
                echo "  BUNDLE: $path -> /tmp/out/"
                cp "$path" /tmp/out/
              fi
            done
          done
          echo ""
          echo "=== Release package ==="
          ls -lh /tmp/out/

      - name: Create artifact (agent)
        run: |
          cd /tmp/out
          tar czf /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz netgazer-agent *.so.* 2>/dev/null || true
          ls -lh /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz

      - name: Create artifact (server)
        run: |
          cd /tmp/out
          tar czf /tmp/netgazer-server-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz netgazer-server *.so.* 2>/dev/null || true
          ls -lh /tmp/netgazer-server-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz

      - name: Upload agent artifact
        uses: actions/upload-artifact@v5
        with:
          name: netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}
          path: /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz

      - name: Upload server artifact
        uses: actions/upload-artifact@v5
        with:
          name: netgazer-server-${{ steps.version.outputs.value }}-${{ matrix.os }}
          path: /tmp/netgazer-server-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Determine version
        id: version
        run: |
          echo "value=${{ github.event_name == 'push' && github.ref_name || inputs.version }}" >> "$GITHUB_OUTPUT"
          # strip leading v if present
          v="${{ github.event_name == 'push' && github.ref_name || inputs.version }}"
          echo "value=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body: |
            ## NetGazer v${{ steps.version.outputs.value }}

            ### Download

            | Binary | Platform |
            |--------|----------|
            | `netgazer-agent-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz` | Agent, Linux x86_64 |
            | `netgazer-agent-v${{ steps.version.outputs.value }}-linux-arm64.tar.gz` | Agent, Linux ARM64 |
            | `netgazer-server-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz` | Server, Linux x86_64 |
            | `netgazer-server-v${{ steps.version.outputs.value }}-linux-arm64.tar.gz` | Server, Linux ARM64 |

            ### Install

            ```bash
            tar xzf netgazer-server-*.tar.gz
            ./netgazer-server --http-port 8080 --grpc-port 50051
            ```
          files: artifacts/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
