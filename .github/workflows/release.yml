name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-agent:
    name: Build Agent (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-amd64
            runner: ubuntu-22.04
            goarch: amd64
          - os: linux-arm64
            runner: ubuntu-22.04-arm
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libndpi-dev

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build agent
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w -extldflags=-Wl,-rpath,\$ORIGIN,--disable-new-dtags -X main.version=${{ steps.version.outputs.value }}" \
            -o /tmp/out/netgazer-agent \
            ./cmd/agent

      - name: Bundle shared libraries
        run: |
          STD_LIBS='libc\.|libm\.|libpthread\.|librt\.|libdl\.|libresolv\.|ld-linux|linux-vdso'
          COMMON_LIBS='libsystemd\.|libcap\.|libgcrypt\.|libgpg-error\.|liblzma\.|libzstd\.|liblz4\.|libdbus-1\.'

          echo "=== netgazer-agent ==="
          ldd /tmp/out/netgazer-agent 2>/dev/null | while read -r line; do
            so=$(echo "$line" | awk '{print $1}')
            path=$(echo "$line" | awk '{print $3}')
            if echo "$so" | grep -qE "${STD_LIBS}|${COMMON_LIBS}"; then
              continue
            fi
            if [ -n "$path" ] && [ -f "$path" ]; then
              case "$path" in
                /tmp/out/*) continue ;;
              esac
              echo "  BUNDLE: $path -> /tmp/out/"
              cp "$path" /tmp/out/
            fi
          done
          echo ""
          echo "=== Release package ==="
          ls -lh /tmp/out/

      - name: Create artifact
        run: |
          cd /tmp/out
          tar czf /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz netgazer-agent *.so.* 2>/dev/null || true
          ls -lh /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}
          path: /tmp/netgazer-agent-${{ steps.version.outputs.value }}-${{ matrix.os }}.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-agent]
    steps:
      - name: Determine version
        id: version
        run: |
          v="${{ github.event_name == 'push' && github.ref_name || inputs.version }}"
          echo "value=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body: |
            ## NetGazer Agent v${{ steps.version.outputs.value }}

            Agent 二进制发布包，部署在被监控的机器上。

            ### 下载

            | Binary | Platform |
            |--------|----------|
            | `netgazer-agent-v${{ steps.version.outputs.value }}-linux-amd64.tar.gz` | Linux x86_64 |
            | `netgazer-agent-v${{ steps.version.outputs.value }}-linux-arm64.tar.gz` | Linux ARM64 |

            ### 安装 Agent

            ```bash
            tar xzf netgazer-agent-*.tar.gz
            sudo setcap cap_net_raw,cap_net_admin=eip ./netgazer-agent
            ./netgazer-agent --server-addr <服务器IP>:50051 --interfaces eth0 --node-id my-node
            ```

            ### Server 部署

            Server 通过 Docker 部署，详见 [README](https://github.com/netgazer/netgazer#docker)。
          files: artifacts/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
