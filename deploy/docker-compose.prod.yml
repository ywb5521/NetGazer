# Production deployment with Nginx reverse proxy
# Usage: docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d

services:
  netgazer-server:
    # Expose ports only to nginx, not to host
    ports: []  # override base compose
    expose:
      - "8080"
      - "50051"

  netgazer-nginx:
    image: nginx:alpine
    container_name: netgazer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/gtopng-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - netgazer-server
