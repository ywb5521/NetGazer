# NetGazer Nginx config for Docker deployment
#
# 端口映射：
#   9527 → HTTP（Dashboard + API + WebSocket）
#   50051 → gRPC（Agent 连接）
#
# gRPC 客户端连接方式：
#   agent --server-addr <服务器IP>:50051
#
# 如果外面用反向代理（如 1panel/宝塔）再套一层：
#   - 反代 9527 端口即可访问页面
#   - 反代 50051 端口需要支持 HTTP/2/gRPC（L4 TCP 反代）

server {
    listen 80;
    server_name _;
    client_max_body_size 200M;

    # WebSocket（优先级高于 / 的通配）
    location /ws {
        proxy_pass http://netgazer-server:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # REST API
    location /api/ {
        proxy_pass http://netgazer-server:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend（SPA，其余全部走前端）
    location / {
        proxy_pass http://netgazer-server:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# gRPC 代理（Agent ↔ Server）
server {
    listen 50051 http2;
    server_name _;

    location /netgazer.v1.AgentService/ {
        grpc_pass grpc://netgazer-server:50051;
        grpc_read_timeout 86400;
        grpc_send_timeout 86400;
    }
}
