# netgazer - Nginx reverse proxy configuration
#
# === 方式一：端口反代（推荐，最简单） ===
# 在 nginx 中直接反代到 netgazer-server 的 HTTP 端口即可：
#
#   server {
#       listen 80;
#       server_name your-domain.com;
#       location / {
#           proxy_pass http://127.0.0.1:8080;
#           proxy_http_version 1.1;
#           proxy_set_header Host $host;
#           proxy_set_header X-Real-IP $remote_addr;
#           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#           proxy_set_header X-Forwarded-Proto $scheme;
#       }
#       location /ws {
#           proxy_pass http://127.0.0.1:8080;
#           proxy_http_version 1.1;
#           proxy_set_header Upgrade $http_upgrade;
#           proxy_set_header Connection "upgrade";
#           proxy_read_timeout 86400;
#       }
#   }
#
# 注意：方式一要求 vite.config.ts 中 base 为 '/'，且 server 启动时指定 --web-dir

# === 方式二：路径前缀（与其他服务共用一个域名） ===
# 如果 netgazer 需要与其他站点共用一个域名，使用 /netgazer/ 前缀：

# gRPC proxy (Agent <-> Server)
location /netgazer.v1.AgentService/ {
    grpc_pass grpc://127.0.0.1:50051;
    grpc_read_timeout 86400;
    grpc_send_timeout 86400;
}

# REST API
location /netgazer/api/ {
    proxy_pass http://127.0.0.1:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# WebSocket
location /netgazer/ws {
    proxy_pass http://127.0.0.1:8080/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
}

# Frontend static files
location /netgazer/ {
    alias /opt/netgazer/frontend/dist/;
    index index.html;
    try_files $uri $uri/ /netgazer/index.html;
}
