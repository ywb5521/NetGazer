# NetGazer Nginx config for Docker deployment
# Proxies API/WS to server container, serves frontend from server

server {
    listen 80;
    server_name _;

    # gRPC proxy for agent connections
    location /netgazer.v1.AgentService/ {
        grpc_pass grpc://netgazer-server:50051;
        grpc_read_timeout 86400s;
        grpc_send_timeout 86400s;
    }

    # REST API
    location /api/ {
        proxy_pass http://netgazer-server:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API auth endpoints
    location /api/auth/ {
        proxy_pass http://netgazer-server:8080/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket
    location /ws {
        proxy_pass http://netgazer-server:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Frontend static files (served by server, or static volume)
    location / {
        proxy_pass http://netgazer-server:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Increase upload size for GeoIP DB uploads
    client_max_body_size 200M;
}
